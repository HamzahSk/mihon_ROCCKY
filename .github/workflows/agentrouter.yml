name: OMP DB Fixer & Auto-Test ARt

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  omp-fix-and-test:
    name: Let OMP Fix & Test DB History
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install OMP
        run: curl -fsSL https://omp.sh/install | sh

      - name: Run OMP to Fix and Verify
        env:
          AGENTROUTER_API_KEY: sk-1BOhosptLV2kztUELb9PhjjvYyIkIhqf7EYFbseS984Kb3FL
          CI: true
          DEBUG: "omp:*"
        run: |
          mkdir -p ~/.omp/agent
          
          # --- 1. MEMBUAT CONFIG MODELS.YML (MENGGUNAKAN PROTOKOL ANTHROPIC) ---
          # Sesuai dokumen AgentRouter: baseUrl tanpa /v1 dan api menggunakan anthropic-messages
          cat << 'EOF' > ~/.omp/agent/models.yml
          providers:
            agentrouter:
              baseUrl: "https://agentrouter.org"
              apiKey: AGENTROUTER_API_KEY
              api: anthropic-messages
              models:
                - id: claude-opus-4-6
                  name: AgentRouter Opus
          EOF
          
          # --- 2. MEMBUAT FILE INSTRUKSI ---
          cat << 'EOF' > prompt.txt
          Tolong periksa kode proyek ini, khususnya yang berkaitan dengan database history pencarian. 
          
          Tugasmu:
          1. Temukan dan perbaiki bug atau masalah logika pada fitur history pencarian. Lalu terapkan kode nya ke fitur aplikasi, jadi jika user melakukan pencarian manga di ekstensi, maka bakal muncul history pencarian nya disitu.
          2. Setelah kamu melakukan perubahan kode, kamu wajib memvalidasi kodemu dengan menjalankan perintah `./gradlew testDebugUnitTest` di terminal menggunakan tool bash.
          3. Jika ada error, perbaiki kodenya lagi, lalu test lagi sampai BUILD SUCCESSFUL.
          4. Lakukan semuanya secara otomatis tanpa meminta persetujuan.
          EOF
          
          # --- 3. JALANKAN OMP & BACA LOG JIKA ERROR ---
          omp --model agentrouter/claude-opus-4-6 -p "$(cat prompt.txt)" || {
            echo "========================================================="
            echo "❌ OMP Gagal! Menampilkan isi log raw-http-request:"
            echo "========================================================="
            # Membaca dan menampilkan isi file log error yang kamu sebutkan tadi
            cat /home/runner/.omp/logs/http-400-requests/* || true
            exit 1
          }

      - name: Collect Changed and New Files
        run: |
          git add -A
          mkdir -p output_artifact
          
          for file in $(git diff --name-only --cached); do
            if [ -f "$file" ]; then
              mkdir -p "output_artifact/$(dirname "$file")"
              cp "$file" "output_artifact/$file"
            fi
          done
          
          echo "File yang berhasil diubah/dibuat beserta strukturnya:"
          git diff --name-status --cached

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-db-fixed-files-${{ github.sha }}
          path: output_artifact/
          