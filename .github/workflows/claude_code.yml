name: OMP DB Fixer & Auto-Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  omp-fix-and-test:
    name: Let OMP Fix & Test DB History
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 1. Siapkan Environment untuk Build & Test ---
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      # ------------------------------------------------

      # --- 2. Install OMP (oh my pi) ---
      - name: Install OMP
        run: curl -fsSL https://omp.sh/install | sh
      # ------------------------------------------------

      # --- 3. Jalankan OMP dengan Instruksi Testing ---
      - name: Run OMP to Fix and Verify
        env:
          # API Key dari Xinjiang Huancheng
          # (Sangat disarankan untuk pindah ini ke GitHub Secrets nanti ya!)
          HUANCHENG_API_KEY: sk-GUWsLR2rd2tuxXP6Nzkux2kVQIZxfuLRPCzO6rx8xwTUJQiI
        run: |
          mkdir -p ~/.omp/agent
          
          # --- A. BIKIN FILE KONFIGURASI (DENGAN PENUTUP EOF YANG BENAR) ---
          cat << 'EOF' > ~/.omp/agent/models.yml
          providers:
            huancheng_api:
              type: openai-responses
              # GANTI URL INI dengan Base URL asli dari dashboard web mereka
              baseURL: "https://api.url-mereka.com/v1" 
              apiKey: env:HUANCHENG_API_KEY
          models:
            my-agent-model:
              provider: huancheng_api
              # Jika di web mereka id modelnya benar-benar ditulis "auto", biarkan seperti ini
              id: auto
          EOF
          
          # --- B. BIKIN FILE PROMPT (DENGAN PENUTUP EOF) ---
          cat << 'EOF' > prompt.txt
          Tolong periksa kode proyek ini, khususnya yang berkaitan dengan database history pencarian. 
          
          Tugasmu:
          1. Temukan dan perbaiki bug atau masalah logika pada fitur history pencarian.
          2. Setelah kamu melakukan perubahan kode, kamu wajib memvalidasi kodemu dengan menjalankan perintah `./gradlew testDebugUnitTest` di terminal menggunakan tool bash.
          3. Jika ada error, perbaiki kodenya lagi, lalu test lagi sampai BUILD SUCCESSFUL.
          4. Lakukan semuanya secara otomatis tanpa meminta persetujuan.
          EOF
          
          # --- C. JALANKAN OMP ---
          # Kita panggil alias "my-agent-model" yang sudah kita daftarkan di models.yml atas
          omp --model my-agent-model -p "$(cat prompt.txt)" || true

      # --- 4. Ekstrak Perbaikan Menjadi Artifact ---
      - name: Generate Patch File
        run: |
          git diff > omp_db_fix_tested.patch
          echo "Perubahan yang berhasil diuji oleh OMP:"
          git diff --stat

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-db-fix-tested-${{ github.sha }}
          path: omp_db_fix_tested.patch
