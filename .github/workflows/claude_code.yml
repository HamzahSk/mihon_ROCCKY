name: OMP DB Fixer & Auto-Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  omp-fix-and-test:
    name: Let OMP Fix & Test DB History
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version-file: .github/.java-version
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install OMP
        run: curl -fsSL https://omp.sh/install | sh

      - name: Run OMP to Fix and Verify
        env:
          # Pastikan kamu menaruh API Key dari dashboard hcnsec di GitHub Secrets!
          # Contoh isinya: sk-1234567890abcdef
          HCNSEC_API_KEY: sk-GUWsLR2rd2tuxXP6Nzkux2kVQIZxfuLRPCzO6rx8xwTUJQiI
        run: |
          mkdir -p ~/.omp/agent
          
          # --- MEMBUAT CONFIG MODELS.YML SESUAI DOKUMEN RESMI OMP ---
          cat << 'EOF' > ~/.omp/agent/models.yml
          providers:
            hcnsec_proxy:
              baseUrl: "https://openai-b922.onrender.com/v1"
              apiKey: HCNSEC_API_KEY
              api: openai-completions
              models:
                - id: auto
                  name: Proxy Auto Model
          EOF
          
          # --- MEMBUAT FILE INSTRUKSI ---
          cat << 'EOF' > prompt.txt
          Tolong periksa kode proyek ini, khususnya yang berkaitan dengan database history pencarian. 
          
          Tugasmu:
          1. Temukan dan perbaiki bug atau masalah logika pada fitur history pencarian.
          2. Setelah kamu melakukan perubahan kode, kamu wajib memvalidasi kodemu dengan menjalankan perintah `./gradlew testDebugUnitTest` di terminal menggunakan tool bash.
          3. Jika ada error, perbaiki kodenya lagi, lalu test lagi sampai BUILD SUCCESSFUL.
          4. Lakukan semuanya secara otomatis tanpa meminta persetujuan.
          EOF
          
          # --- JALANKAN OMP ---
          omp --model hcnsec_proxy/auto -p "$(cat prompt.txt)" || true

      - name: Collect Changed and New Files
        run: |
          # 1. Masukkan semua perubahan dan file baru ke staging area
          git add -A
          
          # 2. Buat folder penampung sementara
          mkdir -p output_artifact
          
          # 3. Looping semua file yang berubah, buat struktur foldernya, dan copy filenya
          for file in $(git diff --name-only --cached); do
            # Pastikan itu benar-benar file, bukan folder yang terhapus
            if [ -f "$file" ]; then
              mkdir -p "output_artifact/$(dirname "$file")"
              cp "$file" "output_artifact/$file"
            fi
          done
          
          echo "File yang berhasil diubah/dibuat beserta strukturnya:"
          git diff --name-status --cached

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: omp-db-fixed-files-${{ github.sha }}
          path: output_artifact/
